name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/editor/pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install editor dependencies
        working-directory: apps/editor
        run: pnpm install --frozen-lockfile

      - name: Install MCP server dependencies
        working-directory: apps/mcp-server
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Check generated registry artifacts are up to date
        run: pnpm gen:check

      - name: Check localized Pages output is up to date
        run: pnpm site:locales:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck editor
        working-directory: apps/editor
        run: pnpm typecheck

      - name: Build editor
        working-directory: apps/editor
        run: pnpm build

      - name: Test MCP server
        working-directory: apps/mcp-server
        run: pnpm test

      - name: Validate example blueprints
        run: |
          pnpm validate examples/dashboard.ui.json
          pnpm validate examples/dashboard.ui.yaml
          pnpm validate examples/freeform-actions.ui.json
          pnpm validate examples/extensions/analytics-insights.ui.json
          pnpm project validate examples/project/app.aub.project.json
          pnpm import:design -- examples/design-bridge/figma-hero.aub.bridge.json --output /tmp/figma-hero.ui.json
          pnpm validate /tmp/figma-hero.ui.json

      - name: Verify AUB CI configuration
        run: pnpm ci:verify -- --config examples/ci/aub.ci.json
